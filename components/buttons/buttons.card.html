<!-- @dsCard group="Components" viewport="700x160" name="Buttons" subtitle="Sage primary, ghost secondary, nav-cta, sizes, disabled" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-primary); background: var(--bg-page); padding: 28px 32px; -webkit-font-smoothing: antialiased; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  .row:last-child { margin-bottom: 0; }
  .label { font-size: 0.48rem; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(138,155,122,0.6); width: 80px; flex-shrink: 0; }
  .btn-sage  { display:inline-block; background:rgba(138,155,122,0.15); border:1px solid rgba(138,155,122,0.7); color:#fff; padding:14px 44px; font-size:0.65rem; font-weight:400; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; transition:background 0.28s,border-color 0.28s; border-radius:8px; }
  .btn-sage:hover { background:rgba(138,155,122,0.3); border-color:rgba(138,155,122,1); }
  .btn-ghost { display:inline-block; border:1px solid rgba(255,255,255,0.3); color:rgba(255,255,255,0.8); padding:14px 44px; font-size:0.65rem; font-weight:400; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; transition:border-color 0.28s,color 0.28s; background:transparent; border-radius:8px; }
  .btn-ghost:hover { border-color:rgba(255,255,255,0.7); color:#fff; }
  .btn-nav   { display:inline-block; border:1px solid rgba(138,155,122,0.6); color:#fff; padding:10px 28px; font-size:0.7rem; font-weight:400; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:background 0.25s,border-color 0.25s; background:transparent; border-radius:6px; }
  .btn-nav:hover { background:rgba(138,155,122,0.2); border-color:rgba(138,155,122,1); }
  .btn-sm    { padding: 10px 28px !important; font-size: 0.6rem !important; }
  .btn-dis   { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Primary</span>
    <button class="btn-sage">View Design Packages</button>
    <button class="btn-sage btn-sm">Enquire</button>
    <button class="btn-sage btn-dis" disabled>Unavailable</button>
  </div>
  <div class="row">
    <span class="label">Ghost</span>
    <button class="btn-ghost">Our Process</button>
    <button class="btn-ghost btn-sm">Learn More</button>
  </div>
  <div class="row">
    <span class="label">Nav CTA</span>
    <button class="btn-nav">Contact</button>
  </div>
</body>
</html>
