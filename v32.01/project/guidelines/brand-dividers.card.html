<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { margin: 0; background: var(--bg-page); font-family: var(--font-primary); padding: 28px 40px; display: flex; flex-direction: column; gap: 24px; -webkit-font-smoothing: antialiased; }
.row { display: flex; align-items: center; gap: 32px; }
.lbl { font-size: 0.5rem; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(138,155,122,0.55); width: 100px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="row">
  <span class="lbl">Botanical Sprig</span>
  <div style="display:flex;align-items:center;gap:22px;color:rgba(210,170,80,1)">
    <div style="width:88px;height:1px;background:rgba(210,170,80,0.35)"></div>
    <svg width="26" height="32" viewBox="0 0 64 80" fill="none" aria-hidden="true">
      <path d="M32 80 C31 60 33 38 32 16" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
      <g fill="currentColor">
        <path d="M32 62 C32 54 38 50 47 49 C44 57 39 61 32 62 Z"/><path d="M32 62 C32 54 26 50 17 49 C20 57 25 61 32 62 Z"/>
        <path d="M32 50 C32 43 37 39 45 38 C42 45 38 49 32 50 Z"/><path d="M32 50 C32 43 27 39 19 38 C22 45 26 49 32 50 Z"/>
        <path d="M32 39 C32 33 36 30 43 29 C40 35 37 38 32 39 Z"/><path d="M32 39 C32 33 28 30 21 29 C24 35 27 38 32 39 Z"/>
        <path d="M32 29 C32 24 35 21 41 20 C38 26 36 28 32 29 Z"/><path d="M32 29 C32 24 29 21 23 20 C26 26 28 28 32 29 Z"/>
        <path d="M32 21 C30 16 31 11 32 7 C33 11 34 16 32 21 Z"/>
      </g>
    </svg>
    <div style="width:88px;height:1px;background:rgba(210,170,80,0.35)"></div>
  </div>
  <span style="font-size:0.5rem;font-weight:400;letter-spacing:0.18em;text-transform:uppercase;color:rgba(201,191,175,0.45);margin-left:18px">Awards section only · gold</span>
</div>
<div class="row">
  <span class="lbl">Diamond Divider</span>
  <div style="display:flex;align-items:center;gap:22px">
    <div style="width:88px;height:1px;background:rgba(138,155,122,0.38)"></div>
    <div style="width:7px;height:7px;background:rgba(138,155,122,0.85);transform:rotate(45deg)"></div>
    <div style="width:88px;height:1px;background:rgba(138,155,122,0.38)"></div>
  </div>
</div>
<div class="row">
  <span class="lbl">Dot Accent</span>
  <div style="display:flex;align-items:center;gap:14px">
    <div style="width:4px;height:4px;border-radius:50%;background:rgba(138,155,122,0.8)"></div>
    <span style="font-size:0.78rem;font-weight:400;letter-spacing:0.06em;color:#eceae4">Credential Name</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;margin-left:24px">
    <div style="width:4px;height:4px;border-radius:50%;background:rgba(138,155,122,0.65);margin-top:1px"></div>
    <span style="font-size:0.78rem;font-weight:400;letter-spacing:0.04em;color:#eceae4">Deliverable Item</span>
  </div>
</div>
<div class="row">
  <span class="lbl">Horizontal Rule</span>
  <div style="flex:1;height:1px;background:rgba(255,255,255,0.07)"></div>
</div>
<div class="row">
  <span class="lbl">Vertical Rule</span>
  <div style="width:1px;height:44px;background:linear-gradient(to bottom,transparent,rgba(138,155,122,0.75))"></div>
</div>
<div class="row">
  <span class="lbl">Progress Bar</span>
  <div style="flex:1;height:2px;background:rgba(138,155,122,0.7)"></div>
</div>
</body>
</html>
