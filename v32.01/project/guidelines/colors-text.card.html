.item:last-child { border-right: none; }
.label { font-size: 0.52rem; font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 4px; }

<body>

  <div class="item"><div class="label">Sage Alt</div><div style="font-size:0.88rem;font-weight:300;color:#a8b299">★ Stars / Bio</div></div>
