<!-- @dsCard group="Colors" viewport="700x200" name="Sage Green Accent" subtitle="The sole brand accent — used at varying opacities" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { margin: 0; background: var(--bg-page); font-family: var(--font-primary); padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.row { display: flex; gap: 8px; }
.swatch { flex: 1; height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
.swatch-label { font-size: 0.52rem; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(0,0,0,0.6); }
.swatch-val { font-size: 0.52rem; font-weight: 300; color: rgba(0,0,0,0.4); margin-top: 2px; }
.swatch-light .swatch-label, .swatch-light .swatch-val { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:#8a9b7a"><span class="swatch-label">Sage 100%</span><span class="swatch-val">#8a9b7a</span></div>
  <div class="swatch swatch-light" style="background:rgba(138,155,122,0.9)"><span class="swatch-label">Sage 90</span></div>
  <div class="swatch swatch-light" style="background:rgba(138,155,122,0.75)"><span class="swatch-label">Sage 75</span></div>
  <div class="swatch swatch-light" style="background:rgba(138,155,122,0.6)"><span class="swatch-label">Sage 60</span></div>
  <div class="swatch swatch-light" style="background:rgba(138,155,122,0.45)"><span class="swatch-label">Sage 45</span></div>
  <div class="swatch swatch-light" style="background:rgba(138,155,122,0.28)"><span class="swatch-label">Sage 28</span></div>
  <div class="swatch swatch-light" style="background:rgba(138,155,122,0.15)"><span class="swatch-label">Sage 15</span></div>
  <div class="swatch swatch-light" style="background:rgba(138,155,122,0.07)"><span class="swatch-label">Sage 7</span></div>
</div>
<div style="display:flex;gap:8px;padding-top:4px">
  <div style="flex:1;padding:8px 10px;border:1px solid rgba(138,155,122,0.45);font-size:0.58rem;font-weight:400;letter-spacing:0.28em;text-transform:uppercase;color:rgba(138,155,122,0.9)">SECTION LABEL</div>
  <div style="flex:1;padding:10px;background:rgba(138,155,122,0.15);border:1px solid rgba(138,155,122,0.7);font-size:0.62rem;font-weight:400;letter-spacing:0.22em;text-transform:uppercase;color:#eceae4;text-align:center">CTA BUTTON</div>
  <div style="flex:1;padding:8px 12px;background:rgba(138,155,122,0.07);border:1px solid rgba(138,155,122,0.35);font-size:0.62rem;font-weight:400;letter-spacing:0.22em;text-transform:uppercase;color:rgba(138,155,122,0.85);text-align:center">TAG BADGE</div>
  <div style="flex:1;padding:8px 12px;border-top:2px solid rgba(138,155,122,0.85);border:1px solid rgba(138,155,122,0.35);border-top:2px solid rgba(138,155,122,0.85);font-size:0.6rem;color:#a8a5a0">Featured Card Top</div>
</div>
</body>
</html>
