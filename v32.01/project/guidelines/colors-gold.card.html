<!-- @dsCard group="Colors" viewport="700x200" name="Gold Awards Palette" subtitle="Award plaque accent — new in v27" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { margin: 0; background: var(--bg-page); font-family: var(--font-primary); padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.row { display: flex; gap: 8px; }
.swatch { flex: 1; height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
.swatch-label { font-size: 0.52rem; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(0,0,0,0.6); }
.swatch-val { font-size: 0.52rem; font-weight: 300; color: rgba(0,0,0,0.4); margin-top: 2px; }
.swatch-light .swatch-label, .swatch-light .swatch-val { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:rgba(210,170,80,1)"><span class="swatch-label">Gold 100</span><span class="swatch-val">d2aa50</span></div>
  <div class="swatch swatch-light" style="background:rgba(210,170,80,0.8)"><span class="swatch-label">Gold 80</span></div>
  <div class="swatch swatch-light" style="background:rgba(210,170,80,0.75)"><span class="swatch-label">Gold 75</span></div>
  <div class="swatch swatch-light" style="background:rgba(210,170,80,0.55)"><span class="swatch-label">Gold 55</span></div>
  <div class="swatch swatch-light" style="background:rgba(210,170,80,0.35)"><span class="swatch-label">Gold 35</span></div>
  <div class="swatch swatch-light" style="background:rgba(210,170,80,0.08)"><span class="swatch-label">Gold 8</span></div>
</div>
<div style="margin-top:4px">
  <div style="background:linear-gradient(160deg,#2a2620 0%,#1a1610 50%,#2a2620 100%);border:1px solid rgba(210,170,80,0.35);border-top:2px solid rgba(210,170,80,0.75);border-radius:12px;padding:20px 28px;display:flex;align-items:center;gap:20px">
    <span style="font-size:1.5rem">🏆</span>
    <div>
      <span style="display:block;font-size:0.54rem;font-weight:400;letter-spacing:0.38em;text-transform:uppercase;color:rgba(210,170,80,0.8)">International Award</span>
      <span style="display:block;font-size:0.9rem;font-weight:200;letter-spacing:0.08em;color:#eceae4">Gardening World Cup</span>
      <span style="display:block;font-size:0.62rem;font-weight:300;color:rgba(210,170,80,0.55)">People's Choice & Best Design · Japan</span>
    </div>
  </div>
</div>
</body>
</html>
