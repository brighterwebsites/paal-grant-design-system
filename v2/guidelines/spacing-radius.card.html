<!-- @dsCard group="Spacing" viewport="700x150" name="Border Radius & Borders" subtitle="Corner radius system and border treatments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { margin: 0; background: var(--bg-page); font-family: var(--font-primary); padding: 24px; -webkit-font-smoothing: antialiased; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.box { height: 48px; width: 80px; border: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.lbl { font-size: 0.48rem; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(138,155,122,0.7); }
.val { font-size: 0.52rem; font-weight: 300; color: rgba(255,255,255,0.4); }
.borders { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.border-item { flex: 1; min-width: 120px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
<div class="row">
  <div class="box" style="border-radius:0px"><div class="lbl">None</div><div class="val">0px</div></div>
  <div class="box" style="border-radius:4px"><div class="lbl">SM</div><div class="val">4px</div></div>
  <div class="box" style="border-radius:6px"><div class="lbl">MD</div><div class="val">6px — Input</div></div>
  <div class="box" style="border-radius:8px"><div class="lbl">LG</div><div class="val">8px — Bio</div></div>
  <div class="box" style="border-radius:12px"><div class="lbl">XL</div><div class="val">12px — Review</div></div>
</div>
<div class="borders">
  <div class="border-item" style="border:1px solid rgba(255,255,255,0.07)"><span class="lbl">Default Border</span><span class="val">1px rgba(255,255,255,0.07)</span></div>
  <div class="border-item" style="border:1px solid rgba(138,155,122,0.45)"><span class="lbl">Accent Border</span><span class="val">1px sage-45</span></div>
  <div class="border-item" style="border-top:2px solid rgba(138,155,122,0.85);border:1px solid rgba(138,155,122,0.35);border-top:2px solid rgba(138,155,122,0.85)"><span class="lbl">Top Accent</span><span class="val">2px sage-85 top</span></div>
  <div class="border-item" style="border-top:2px solid rgba(210,170,80,0.75);border:1px solid rgba(210,170,80,0.3);border-top:2px solid rgba(210,170,80,0.75)"><span class="lbl">Gold Accent</span><span class="val">2px gold-75 top</span></div>
</div>
</body>
</html>
