<!-- @dsCard group="Colors" viewport="700x200" name="Page & Section Backgrounds" subtitle="Warm charcoal page/section fills — the structural foundation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { margin: 0; background: var(--bg-page); font-family: var(--font-primary); padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.row { display: flex; gap: 8px; align-items: stretch; }
.swatch { flex: 1; height: 64px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
.swatch-label { font-size: 0.55rem; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.swatch-val { font-size: 0.6rem; font-weight: 300; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:#2b2b2b"><span class="swatch-label">Page</span><span class="swatch-val">#2b2b2b</span></div>
  <div class="swatch" style="background:#383838"><span class="swatch-label">Section Alt</span><span class="swatch-val">#383838</span></div>
  <div class="swatch" style="background:#323232"><span class="swatch-label">Card Mid</span><span class="swatch-val">#323232</span></div>
  <div class="swatch" style="background:#1e1e1c"><span class="swatch-label">Card Dark</span><span class="swatch-val">#1e1e1c</span></div>
  <div class="swatch" style="background:#1a2018"><span class="swatch-label">Card Featured</span><span class="swatch-val">#1a2018</span></div>
  <div class="swatch" style="background:#222222"><span class="swatch-label">Footer</span><span class="swatch-val">#222222</span></div>
  <div class="swatch" style="background:#0d1410"><span class="swatch-label">Nav Panel</span><span class="swatch-val">#0d1410</span></div>
</div>
</body>
</html>
