<!-- @dsCard group="Spacing" viewport="700x200" subtitle="Transitions, Ken Burns animation, hover states" name="Motion & Effects" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-primary); background: #0a0d08; padding: 24px; }
  .head { font-size: 0.48rem; font-weight: 400; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(138,155,122,0.7); margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
  .demo { background: #0d1210; border: 1px solid rgba(255,255,255,0.07); padding: 16px 18px; border-radius: 8px; }
  .label { font-size: 0.55rem; font-weight: 400; letter-spacing: 0.15em; color: rgba(138,155,122,0.8); text-transform: uppercase; margin-bottom: 8px; }
  .desc  { font-size: 0.62rem; font-weight: 300; color: rgba(201,191,175,0.55); line-height: 1.7; }
  .pill  { display: inline-block; padding: 5px 14px; border: 1px solid rgba(138,155,122,0.5); font-size: 0.6rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: #fff; border-radius: 6px; margin-top: 8px; cursor: pointer; transition: background var(--transition-mid), border-color var(--transition-mid); background: rgba(138,155,122,0.12); }
  .pill:hover { background: rgba(138,155,122,0.28); border-color: rgba(138,155,122,0.9); }
  .img-wrap { width: 100%; height: 60px; border-radius: 6px; overflow: hidden; background: #161a14; margin-top: 8px; }
  .img-demo  { width: 100%; height: 100%; background: linear-gradient(135deg, rgba(138,155,122,0.2), rgba(138,155,122,0.05)); transition: transform var(--img-hover-duration); cursor: pointer; }
  .img-wrap:hover .img-demo { transform: scale(1.05); }
  .fade-demo { opacity: 0; transform: translateY(12px); animation: pg-fade-in 1.2s ease 0.3s forwards; font-size: 0.78rem; font-weight: 200; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; margin-top: 8px; }
</style>
</head>
<body>
  <div class="head">Motion & Interaction Tokens</div>
  <div class="grid">
    <div class="demo">
      <div class="label">Button Hover</div>
      <div class="desc">0.28s ease — background + border-color shift to sage</div>
      <div><div class="pill">View Package</div></div>
    </div>
    <div class="demo">
      <div class="label">Image Hover</div>
      <div class="desc">scale(1.05) — 0.7s ease — parent clips overflow</div>
      <div class="img-wrap"><div class="img-demo"></div></div>
    </div>
    <div class="demo">
      <div class="label">Scroll Fade-In</div>
      <div class="desc">opacity 0→1, translateY 24px→0, 0.9s ease</div>
      <div class="fade-demo">Dream Garden</div>
    </div>
  </div>
</body>
</html>
